name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (eBPF/BCC)
        run: |
          sudo apt-get update
          sudo apt-get install -y bpfcc-tools libbpfcc-dev linux-headers-$(uname -r)

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check behaveguard/ tests/

      - name: Format check (black)
        run: black --check behaveguard/ tests/

      - name: Type check (mypy)
        run: mypy behaveguard/

      - name: Unit tests with coverage
        run: pytest tests/unit/ -v --cov=behaveguard --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t behaveguard:test .

      - name: Smoke test (--help)
        run: docker run --rm behaveguard:test --help
